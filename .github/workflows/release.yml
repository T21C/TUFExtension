name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Package extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release tag
        id: version
        run: |
          PACKAGE_VERSION="$(bun -e "console.log(require('./package.json').version)")"
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          PRERELEASE="false"

          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${PACKAGE_VERSION}."
            echo "Expected ${EXPECTED_TAG}."
            exit 1
          fi

          if [[ "${PACKAGE_VERSION}" == *-* ]]; then
            PRERELEASE="true"
          fi

          echo "version=${PACKAGE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${EXPECTED_TAG}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${PRERELEASE}" >> "${GITHUB_OUTPUT}"

      - name: Typecheck
        run: bun run typecheck

      - name: Produce Chrome artifact
        run: bun run zip

      - name: Produce Firefox artifact
        run: bun run zip:firefox

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TUFExtension ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: |
            .output/tufe-*-chrome.zip
            .output/tufe-*-firefox.zip
